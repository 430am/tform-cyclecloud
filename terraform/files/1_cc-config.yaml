#cloud-config
# This file is used to configure the CycleCloud application server.
apt:
  preserve_sources_list: true
  sources:
    cyclecloud.list:
      source: deb [signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/cyclecloud stable main
    azure_cli.list:
      source: deb [signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/azure-cli/ $(lsb_release -cs) main

package_update: true
package_upgrade: true

packages:
  - curl
  - gnupg2
  - apt-transport-https
  - openjdk-8-jre
  - cyclecloud8